version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-cms-extractor
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    command: serve
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cms-network

  cms-form-extractor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cms-form-extractor
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5-vl-instruct
      - OLLAMA_TIMEOUT_SECONDS=120
      - FORM_EXTRACTION_MAX_RETRIES=3
      - FORM_EXTRACTION_CONFIDENCE_THRESHOLD=0.7
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - cms-network

volumes:
  ollama_data:

networks:
  cms-network:
    driver: bridge
